<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI Light Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --present: #3fb950;
            --moving: #58a6ff;
            --absent: #f85149;
            --still: #6e7681;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        h1 { font-size: 1.5rem; font-weight: 600; }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }
        
        .status-dot.active { background: var(--present); }
        .status-dot.calibrating { 
            background: #f0883e;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }
        
        .panel-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* === PRESENCE/MOVEMENT STATUS === */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .status-box {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            background: var(--bg);
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }
        
        .status-box.present {
            border-color: var(--present);
            background: rgba(63, 185, 80, 0.1);
        }
        
        .status-box.moving {
            border-color: var(--moving);
            background: rgba(88, 166, 255, 0.1);
        }
        
        .status-box.absent {
            border-color: var(--border);
        }
        
        .status-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .status-box.present .status-value { color: var(--present); }
        .status-box.moving .status-value { color: var(--moving); }
        
        .status-label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        
        /* === POSITION VISUALIZATION === */
        .position-container {
            height: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .fresnel-zones {
            flex: 1;
            position: relative;
            background: var(--bg);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .zone {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(88, 166, 255, 0.05);
            border-right: 1px dashed var(--border);
        }
        
        .zone-label {
            position: absolute;
            bottom: 5px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        
        .position-marker {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--present);
            transition: left 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .position-marker.person {
            background: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.5);
        }
        
        .position-trail {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--border);
            transform: translateY(-50%);
        }
        
        .trail-dot {
            position: absolute;
            top: 50%;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            transform: translate(-50%, -50%);
            opacity: 0.5;
        }
        
        .rx-marker {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            border: 2px solid var(--present);
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 0.7rem;
            color: var(--present);
        }
        
        .tx-marker {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            border: 2px solid var(--absent);
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 0.7rem;
            color: var(--absent);
        }
        
        .position-axis {
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        
        .direction-indicator {
            text-align: center;
            font-size: 0.9rem;
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
            margin-top: 10px;
        }
        
        .direction-indicator.toward { color: var(--moving); }
        .direction-indicator.away { color: var(--present); }
        
        /* === SPATIAL PROFILE === */
        .spatial-profile {
            height: 120px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding: 10px;
            background: var(--bg);
            border-radius: 8px;
        }
        
        .spatial-bar {
            flex: 1;
            background: var(--present);
            border-radius: 3px 3px 0 0;
            min-height: 5px;
            transition: height 0.2s ease;
        }
        
        /* === CHARTS === */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .chart-container {
            height: 150px;
        }
        
        .chart-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }
        
        .chart-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }
        
        /* === INFO BAR === */
        .info-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        
        .info-value {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        /* === LOG === */
        .log-panel {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.8rem;
        }
        
        .log-entry:last-child { border-bottom: none; }
        
        .log-time { color: var(--text-dim); margin-right: 10px; }
        .log-status { font-weight: 600; }
        .log-present { color: var(--present); }
        .log-moving { color: var(--moving); }
        .log-absent { color: var(--absent); }
        
        .calibration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .calibration-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }
        
        .calibration-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--present);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .calibration-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .calibration-progress {
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Calibration Overlay -->
    <div id="calibrationOverlay" class="calibration-overlay">
        <div class="calibration-box">
            <div class="calibration-spinner"></div>
            <div class="calibration-text">Calibrating...</div>
            <div class="calibration-progress" id="calibrationProgress">0%</div>
        </div>
    </div>
    
    <!-- Header -->
    <div class="header">
        <h1>CSI Light Dashboard</h1>
        <div class="status-indicator">
            <div id="statusDot" class="status-dot calibrating"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>
    
    <!-- Main Grid -->
    <div class="main-grid">
        <!-- Presence & Movement Status -->
        <div class="panel">
            <div class="panel-title">Detection Status</div>
            <div class="status-grid">
                <div id="presenceBox" class="status-box absent">
                    <div class="status-value" id="presenceValue">--</div>
                    <div class="status-label">Presence</div>
                </div>
                <div id="movementBox" class="status-box absent">
                    <div class="status-value" id="movementValue">--</div>
                    <div class="status-label">Movement</div>
                </div>
            </div>
        </div>
        
        <!-- Position Visualization -->
        <div class="panel">
            <div class="panel-title">Position Estimation</div>
            <div class="position-container">
                <div class="fresnel-zones" id="fresnelZone">
                    <div class="position-trail" id="positionTrail"></div>
                    <div class="position-marker" id="positionMarker">?</div>
                    <div class="tx-marker">TX</div>
                    <div class="rx-marker">RX</div>
                </div>
                <div class="position-axis">
                    <span>TX (3m)</span>
                    <span>RX</span>
                </div>
                <div id="directionIndicator" class="direction-indicator">
                    Direction: <span id="directionText">--</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Spatial Profile -->
    <div class="panel" style="margin-top: 20px;">
        <div class="panel-title">Spatial Profile (Subcarrier Regions)</div>
        <div class="spatial-profile" id="spatialProfile">
            <div class="spatial-bar" style="height: 80%;"></div>
            <div class="spatial-bar" style="height: 60%;"></div>
            <div class="spatial-bar" style="height: 70%;"></div>
            <div class="spatial-bar" style="height: 90%;"></div>
            <div class="spatial-bar" style="height: 85%;"></div>
            <div class="spatial-bar" style="height: 75%;"></div>
            <div class="spatial-bar" style="height: 65%;"></div>
            <div class="spatial-bar" style="height: 80%;"></div>
        </div>
    </div>
    
    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-panel">
            <div class="chart-title">Presence Probability</div>
            <div class="chart-container" id="presenceChart"></div>
        </div>
        <div class="chart-panel">
            <div class="chart-title">Movement Index</div>
            <div class="chart-container" id="movementChart"></div>
        </div>
    </div>
    
    <!-- Info Bar -->
    <div class="info-bar">
        <div class="info-item">
            <span class="info-label">RSSI:</span>
            <span class="info-value" id="rssiValue">-- dBm</span>
        </div>
        <div class="info-item">
            <span class="info-label">Position:</span>
            <span class="info-value" id="positionValue">--</span>
        </div>
        <div class="info-item">
            <span class="info-label">Frames:</span>
            <span class="info-value" id="frameCount">0</span>
        </div>
    </div>
    
    <!-- Activity Log -->
    <div class="panel log-panel" style="margin-top: 20px;">
        <div class="panel-title">Activity Log</div>
        <div id="logContainer"></div>
    </div>

    <script>
        // === GLOBALS ===
        let ws = null;
        let presenceChart = null;
        let movementChart = null;
        let frameCount = 0;
        let presenceHistory = [];
        let movementHistory = [];
        const MAX_HISTORY = 200;
        const MAX_TRAIL = 20;
        
        // === INIT ===
        window.onload = () => {
            initCharts();
            connectWebSocket();
        };
        
        // === WEBSOCKET ===
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'update') {
                    updateUI(data);
                }
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, 2000);
            };
            
            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }
        
        // === CHARTS ===
        function initCharts() {
            const opts = {
                width: 400,
                height: 120,
                series: [
                    {},
                    {
                        stroke: '#3fb950',
                        fill: 'rgba(63, 185, 80, 0.1)',
                    }
                ],
                axes: [
                    { show: false },
                    { show: true, stroke: '#8b949e', grid: { stroke: '#30363d' } }
                ],
                scales: {
                    x: { time: false },
                    y: { min: 0, max: 1 }
                },
                cursor: { show: false }
            };
            
            presenceChart = new uPlot(opts, [generateTimestamps(), []], document.getElementById('presenceChart'));
            movementChart = new uPlot(opts, [generateTimestamps(), []], document.getElementById('movementChart'));
        }
        
        function generateTimestamps() {
            const now = Date.now();
            return Array.from({ length: MAX_HISTORY }, (_, i) => now - (MAX_HISTORY - i) * 100);
        }
        
        function updateCharts() {
            const timestamps = generateTimestamps();
            presenceChart.setData([timestamps, presenceHistory]);
            movementChart.setData([timestamps, movementHistory]);
        }
        
        // === UI UPDATE ===
        function updateUI(data) {
            frameCount++;
            
            // Update calibration status
            if (data.calibrating) {
                document.getElementById('calibrationOverlay').classList.remove('hidden');
                document.getElementById('calibrationProgress').textContent = 
                    Math.round(data.calibration_progress * 100) + '%';
            } else {
                document.getElementById('calibrationOverlay').classList.add('hidden');
                document.getElementById('statusDot').classList.remove('calibrating');
                document.getElementById('statusDot').classList.add('active');
                document.getElementById('statusText').textContent = 'Active';
            }
            
            // Update presence/movement status
            const presenceValue = data.presence_value || 0;
            const movementValue = data.movement_value || 0;
            
            // Update boxes
            const presenceBox = document.getElementById('presenceBox');
            const movementBox = document.getElementById('movementBox');
            
            presenceBox.className = 'status-box ' + (data.presence ? 'present' : 'absent');
            movementBox.className = 'status-box ' + (data.movement ? 'moving' : 'absent');
            
            document.getElementById('presenceValue').textContent = data.presence ? 'YES' : 'NO';
            document.getElementById('movementValue').textContent = data.movement ? 'MVG' : 'STL';
            
            // Update history for charts
            presenceHistory.push(presenceValue);
            movementHistory.push(movementValue);
            
            if (presenceHistory.length > MAX_HISTORY) presenceHistory.shift();
            if (movementHistory.length > MAX_HISTORY) movementHistory.shift();
            
            // Update position
            const pos = data.position || 0.5;
            const marker = document.getElementById('positionMarker');
            const pct = (1 - pos) * 100; // Invert so TX is left, RX is right
            marker.style.left = `calc(${pct}% - 15px)`;
            
            // Update trail
            updateTrail(data.position_raw || pos);
            
            // Update direction
            const dirIndicator = document.getElementById('directionIndicator');
            const dirText = document.getElementById('directionText');
            if (data.direction < 0) {
                dirIndicator.className = 'direction-indicator toward';
                dirText.textContent = '← Toward TX';
            } else if (data.direction > 0) {
                dirIndicator.className = 'direction-indicator away';
                dirText.textContent = 'Away →';
            } else {
                dirIndicator.className = 'direction-indicator';
                dirText.textContent = '—';
            }
            
            // Update spatial profile
            updateSpatialProfile(data.spatial_profile || []);
            
            // Update info bar
            document.getElementById('rssiValue').textContent = (data.rssi || 0).toFixed(1) + ' dBm';
            document.getElementById('positionValue').textContent = ((data.position || 0.5) * 3).toFixed(1) + 'm';
            document.getElementById('frameCount').textContent = frameCount;
            
            // Update charts
            updateCharts();
            
            // Log entry
            addLogEntry(data);
        }
        
        function updateTrail(currentPos) {
            const trail = document.getElementById('positionTrail');
            trail.innerHTML = '';
            
            // Add past positions as dots
            const recentPositions = presenceHistory.slice(-MAX_TRAIL);
            recentPositions.forEach((pos, i) => {
                const dot = document.createElement('div');
                dot.className = 'trail-dot';
                dot.style.left = `${(1 - pos) * 100}%`;
                dot.style.opacity = (i / MAX_TRAIL) * 0.5;
                trail.appendChild(dot);
            });
        }
        
        function updateSpatialProfile(profile) {
            const container = document.getElementById('spatialProfile');
            container.innerHTML = '';
            
            profile.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'spatial-bar';
                bar.style.height = `${Math.max(5, val * 100)}%`;
                container.appendChild(bar);
            });
        }
        
        function addLogEntry(data) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            const presClass = data.presence ? 'log-present' : 'log-absent';
            const movClass = data.movement ? 'log-moving' : '';
            
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-status ${presClass}">${data.presence ? 'PRESENT' : 'ABSENT'}</span>
                <span class="log-status ${movClass}">${data.movement ? '| MOVING' : ''}</span>
                <span style="margin-left: 15px; color: var(--text-dim)">
                    pos: ${((data.position || 0.5) * 3).toFixed(1)}m | rssi: ${(data.rssi || 0).toFixed(0)}
                </span>
            `;
            
            container.insertBefore(entry, container.firstChild);
            
            // Keep only last 20 entries
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
    </script>
</body>
</html>
